<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <!-- Dynamic SEO -->
  <title id="meta-title">Blog | Calming Currents Beauty Spa</title>
  <meta id="meta-description" name="description" content="Massage therapy and wellness tips from Calming Currents Beauty Spa Johannesburg."/>

  <!-- Schema container -->
  <script type="application/ld+json" id="blog-schema">
  {}
  </script>

  <style>
    body{
      font-family: Arial, sans-serif;
      line-height: 1.7;
      background:#fff;
      color:#333;
      max-width:900px;
      margin:auto;
      padding:2rem;
    }

    h1{
      color:#0a3d62;
      margin-bottom:0.5rem;
    }

    .date{
      color:#888;
      margin-bottom:2rem;
      display:block;
    }

    .content p{
      margin-bottom:1rem;
    }

    .back{
      display:inline-block;
      margin-bottom:2rem;
      color:#0a3d62;
      text-decoration:none;
      font-weight:600;
    }
  </style>
</head>

<body>

  <a href="/blog.html" class="back">← Back to Blog</a>

  <article>
    <h1 id="post-title">Loading...</h1>
    <span class="date" id="post-date"></span>
    <div id="post-content" class="content"></div>
  </article>


<script>
/* ===============================
   CONTENTFUL SETTINGS
================================ */
const SPACE_ID = "09muo917z9ra";
const ACCESS_TOKEN = "Z2-ybwP2VOWRp1wNWpxaaAl0P8sekgACZD-QXYDFrdw";


/* ===============================
   GET SLUG FROM URL
================================ */
const params = new URLSearchParams(window.location.search);
const slug = params.get("slug");

if(!slug){
  document.getElementById("post-title").innerText = "Post not found";
  throw new Error("No slug provided");
}


/* ===============================
   FETCH SINGLE POST
================================ */
async function fetchPost(){

  const res = await fetch(
    `https://cdn.contentful.com/spaces/${SPACE_ID}/environments/master/entries?access_token=${ACCESS_TOKEN}&content_type=blogPost&fields.slug=${slug}`
  );

  const data = await res.json();

  if(!data.items.length){
    document.getElementById("post-title").innerText = "Post not found";
    return;
  }

  const item = data.items[0].fields;

  const title = item.title;
  const date = item.publishedDate;
  const content = item.content;


  /* ===============================
     CONVERT CONTENTFUL RICH TEXT
  ================================= */
  let html = "";

content.content.forEach(block => {

  // TEXT PARAGRAPHS
  if(block.nodeType === "paragraph"){
    const text = block.content.map(c => c.value || "").join("");
    html += `<p>${text}</p>`;
  }

  // IMAGES
  if(block.nodeType === "embedded-asset-block"){
    const assetId = block.data.target.sys.id;

    const asset = data.includes.Asset.find(a => a.sys.id === assetId);

    if(asset){
      const url = "https:" + asset.fields.file.url;
      const alt = asset.fields.title || "";

      html += `<img src="${url}" alt="${alt}" style="width:100%;margin:20px 0;border-radius:8px;">`;
    }
  }

});

  /* ===============================
     INJECT INTO PAGE
  ================================= */
  document.getElementById("post-title").innerText = title;
  document.getElementById("post-date").innerText =
    new Date(date).toLocaleDateString();

  document.getElementById("post-content").innerHTML = html;

  /* ===============================
     DYNAMIC SEO
  ================================= */
  document.title = title + " | Calming Currents Beauty Spa";

  document
    .getElementById("meta-description")
    .setAttribute("content", text.substring(0,150));


  /* ===============================
     BLOG POST SCHEMA
  ================================= */
  const schema = {
    "@context": "https://schema.org",
    "@type": "BlogPosting",
    "headline": title,
    "datePublished": date,
    "author": {
      "@type": "Organization",
      "name": "Calming Currents Beauty Spa"
    },
    "description": text.substring(0,150),
    "mainEntityOfPage": window.location.href
  };

  document.getElementById("blog-schema").textContent =
    JSON.stringify(schema);
}

fetchPost();
</script>

  
<style>
#chatbot {
  position: fixed;
  bottom: 20px;
  right: 20px;
  width: 320px;
  background: #0b3d2e;
  color: white;
  border-radius: 15px;
  box-shadow: 0 5px 25px rgba(0,0,0,0.3);
  display: none;
  font-family: Arial, sans-serif;
  overflow: hidden;
}

#chat-header {
  background: #0f5c45;
  padding: 12px;
  font-weight: bold;
}

#chat-body {
  padding: 15px;
}

.msg {
  margin-bottom: 10px;
  animation: fadeIn 0.5s ease;
}

.option {
  display: block;
  background: white;
  color: #0b3d2e;
  padding: 10px;
  margin: 6px 0;
  border-radius: 8px;
  text-align: center;
  cursor: pointer;
  font-weight: bold;
}

.option:hover {
  background: #d4f5e9;
}

#close {
  float: right;
  cursor: pointer;
}

@keyframes fadeIn {
  from {opacity:0; transform:translateY(10px);}
  to {opacity:1; transform:translateY(0);}
}
</style>

<div id="chatbot">
  <div id="chat-header">
    💆 Instant Relief Booking
    <span id="close">✖</span>
  </div>
  <div id="chat-body"></div>
</div>

<script>
let chatbot = document.getElementById("chatbot");
let chatBody = document.getElementById("chat-body");
let triggered = false;

function showChatbot() {
  if (!triggered) {
    chatbot.style.display = "block";
    startConversation();
    triggered = true;
  }
}

// TRIGGERS
setTimeout(showChatbot, 7000);

window.addEventListener("scroll", () => {
  let scrollPercent = (window.scrollY / (document.body.scrollHeight - window.innerHeight)) * 100;
  if (scrollPercent > 35) showChatbot();
});

document.addEventListener("mouseleave", function(e) {
  if (e.clientY < 10) showChatbot();
});

document.getElementById("close").onclick = () => chatbot.style.display = "none";

// FLOW
function startConversation() {
    addMessage("Back or neck pain? 😣");

  setTimeout(() => {
    addMessage("We can relieve it in just 60 minutes — even at your home.");
  }, 1200);

  setTimeout(() => {
    addOptions([
      {text: "I need pain relief now", action: stepPain},
      {text: "Do you come to me?", action: stepMobile},
      {text: "Show prices", action: stepPrice}
    ]);
  }, 2200);
}

function stepPain() {
  chatBody.innerHTML = "";
  addMessage("You're not alone — most clients come in stressed or in pain.");

  setTimeout(() => {
    addMessage("⚠️ Only 2 slots left today.");
  }, 1200);

  setTimeout(() => {
    addOptions([
      {
        text: "Book at spa",
        link: "https://wa.me/27697507959?text=Hi%20I%20want%20to%20book%20a%20pain%20relief%20massage%20today"
      },
      {
        text: "Book at my home",
        link: "https://wa.me/27697507959?text=Hi%20I%20want%20a%20mobile%20massage%20at%20my%20location"
      }
    ]);
  }, 2200);
}

function stepMobile() {
  chatBody.innerHTML = "";
  addMessage("Yes 💚 we offer mobile massage services.");

  setTimeout(() => {
    addMessage("We come to your home, set up & help you fully relax.");
  }, 1200);

  setTimeout(() => {
    addOptions([
      {
        text: "Book home service",
        link: "https://wa.me/27697507959?text=Hi%20I%20want%20to%20book%20a%20massage%20at%20my%20home"
      },
      {
        text: "Ask questions",
        link: "https://wa.me/27697507959?text=Hi%20I%20want%20to%20know%20more%20about%20your%20mobile%20service"
      }
    ]);
  }, 2200);
}

function stepPrice() {
  chatBody.innerHTML = "";
  addMessage("Our massages are affordable & focused on real results.");

  setTimeout(() => {
    addOptions([
      {
        text: "Send me prices",
        link: "https://wa.me/27697507959?text=Hi%20please%20send%20me%20your%20massage%20prices"
      },
      {
        text: "Which one is best for pain?",
        action: stepPain
      }
    ]);
  }, 1500);
}

// HELPERS
function addMessage(text) {
  let msg = document.createElement("div");
  msg.className = "msg";
  msg.innerHTML = text;
  chatBody.appendChild(msg);
}

function addOptions(options) {
  options.forEach(opt => {
    let btn = document.createElement("div");
    btn.className = "option";
    btn.innerText = opt.text;

    if (opt.link) {
      btn.onclick = () => window.location.href = opt.link;
    } else {
      btn.onclick = opt.action;
    }

    chatBody.appendChild(btn);
  });
}
</script>
  
</body>
  </html>
